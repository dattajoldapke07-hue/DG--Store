<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💎 Datta & Ajay's Luxury Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root { 
            --primary: #6366f1; 
            --dark: #0f172a; 
            --accent: #f43f5e;
            --surface: #ffffff;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: var(--text-main); scroll-behavior: smooth; }
        .hidden { display: none !important; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Header Modern */
        header { 
            background: rgba(255, 255, 255, 0.8); 
            backdrop-filter: blur(12px);
            padding: 12px 20px; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
            position: sticky; top: 0; z-index: 1000;
            display: flex; flex-direction: column; align-items: center;
        }

        .logo { font-weight: 800; font-size: 1.4rem; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -1px; }

        .nav-buttons { display: flex; gap: 10px; margin-top: 15px; width: 100%; justify-content: center; }
        .btn { 
            background: var(--surface); border: 1px solid #e2e8f0; color: var(--text-main); 
            padding: 8px 16px; border-radius: 12px; cursor: pointer; font-size: 0.85rem; 
            font-weight: 600; display: flex; align-items: center; gap: 8px; transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .btn:active { transform: scale(0.95); }
        .btn-cart { background: var(--dark); color: white; border: none; }

        /* Categories Ribbon */
        .cat-scroll { display: flex; overflow-x: auto; gap: 25px; padding: 20px; background: var(--surface); scrollbar-width: none; }
        .cat-item { text-align: center; flex: 0 0 auto; cursor: pointer; transition: 0.3s; }
        .cat-item img { 
            width: 65px; height: 65px; border-radius: 20px; 
            object-fit: cover; border: 3px solid transparent; transition: 0.3s;
            box-shadow: var(--shadow);
        }
        .cat-item:hover img { border-color: var(--primary); transform: translateY(-5px); }
        .cat-item span { display: block; font-size: 0.75rem; margin-top: 8px; font-weight: 600; opacity: 0.8; }

        /* Product Cards Premium */
        #products { display: grid; gap: 15px; padding: 15px; grid-template-columns: repeat(2, 1fr); }
        @media (min-width: 1024px) { #products { grid-template-columns: repeat(5, 1fr); gap: 25px; padding: 40px; } }
        
        .product { 
            background: var(--surface); border-radius: 20px; overflow: hidden; 
            transition: all 0.3s; border: 1px solid rgba(0,0,0,0.03);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .product:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .product img { width: 100%; height: 180px; object-fit: cover; }
        .p-info { padding: 15px; text-align: left; }
        .p-name { font-size: 0.9rem; font-weight: 600; margin: 0; color: var(--dark); height: 2.4em; overflow: hidden; }
        .p-price { font-size: 1.1rem; font-weight: 700; color: var(--primary); display: block; margin: 8px 0; }
        
        .add-btn { 
            background: #f1f5f9; color: var(--dark); border: none; padding: 10px; 
            width: 100%; border-radius: 12px; cursor: pointer; font-weight: 700; 
            font-size: 0.8rem; transition: 0.2s;
        }
        .product:hover .add-btn { background: var(--primary); color: white; }

        /* Sidebar Glassify */
        .sidebar { 
            position: fixed; top: 0; right: -100%; width: 90%; max-width: 400px; height: 100%; 
            background: white; z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; flex-direction: column;
        }
        .sidebar.open { right: 0; box-shadow: -20px 0 50px rgba(0,0,0,0.15); }
        .sb-head { padding: 25px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; font-size: 1.2rem; }

        /* Checkout Styling */
        .modal-overlay { 
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(8px); z-index: 3000; display: flex; justify-content: center; align-items: center; 
        }
        .modal-content { 
            background: white; width: 95%; max-width: 500px; border-radius: 24px; 
            padding: 30px; position: relative; max-height: 90vh; overflow-y: auto;
        }
        input, select, textarea { 
            width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #e2e8f0; 
            border-radius: 14px; font-size: 0.95rem; background: #f8fafc;
        }
        input:focus { border-color: var(--primary); outline: none; background: white; }

        /* Order Success Animation */
        .success-check { color: #10b981; font-size: 4rem; margin-bottom: 20px; animation: scaleUp 0.5s ease; }
        @keyframes scaleUp { from {transform: scale(0);} to {transform: scale(1);} }

        /* Invoice Premium */
        .invoice-box { background: #fff; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; }
        .invoice-top { background: var(--dark); color: white; padding: 20px; text-align: center; }
        .bill-item { display: flex; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>

<div id="loginOverlay" class="modal-overlay" style="background: var(--dark); z-index: 5000;">

        <button class="add-btn" style="background: var(--primary); color: white; padding: 16px; font-size: 1rem;" onclick="saveUser()">Start Shopping <i class="fa fa-arrow-right"></i></button>
    </div>
</div>

            <button class="btn btn-cart" onclick="toggleSidebar('cartSidebar')">

            </button>
            <button class="btn" style="color: var(--accent);" onclick="logout()"><i class="fa fa-power-off"></i></button>
        </div>
    </header>

    <div class="cat-scroll" id="catBar"></div>
    
    <div style="padding: 20px 20px 0; font-weight: 700; font-size: 1.2rem;" id="catTitle">Featured Collection</div>
    <main id="products"></main>
</div>

<div id="cartSidebar" class="sidebar">
    <div class="sb-head"><b>Your Bag 👜</b><i class="fa fa-times" style="cursor:pointer" onclick="toggleSidebar('cartSidebar')"></i></div>
    <div id="cartItems" style="flex:1; overflow-y:auto; padding:15px;"></div>
    <div style="padding:25px; background: #f8fafc; border-top: 1px solid #e2e8f0;">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span style="color: #64748b;">Subtotal</span>
            <b style="font-size: 1.3rem;">₹<span id="totalPrice">0</span></b>
        </div>
        <button class="add-btn" style="background:var(--dark); color:white; padding:16px; font-size:1rem;" onclick="openCheckout()">Checkout Now</button>
    </div>
</div>

<div id="checkoutModal" class="modal-overlay hidden">
    <div class="modal-content">
        <div id="checkoutForm">
            <h2 style="margin-top:0; letter-spacing:-1px;">Secure Checkout 🔐</h2>
            <label style="font-size: 0.8rem; font-weight:600; color:#64748b;">SHIPPING NAME</label>
            <input type="text" id="cName" placeholder="Full Name">
            
            <label style="font-size: 0.8rem; font-weight:600; color:#64748b;">MOBILE VERIFICATION</label>
            <div class="phone-group">
                <select id="countryCode">
                    <option value="+91">🇮🇳 +91</option>
                    <option value="+1">🇺🇸 +1</option>
                    <option value="+44">🇬🇧 +44</option>
                </select>
                <input type="number" id="cPhone" placeholder="Phone Number">
            </div>

            <label style="font-size: 0.8rem; font-weight:600; color:#64748b;">DELIVERY ADDRESS</label>
            <textarea id="cAddr" placeholder="Street, Building, City, Pincode" rows="3"></textarea>
            
            <h4 style="margin:20px 0 10px;">Payment Method</h4>
            <div class="pay-option" id="opt-upi" onclick="setPay('upi')"><i class="fa fa-qrcode"></i> UPI Transfer</div>
            <div id="upiBox" class="hidden"><input type="text" id="upiIdInput" placeholder="Enter your UPI ID"></div>
            <div class="pay-option" id="opt-cod" onclick="setPay('cod')"><i class="fa fa-truck"></i> Cash on Delivery</div>

            <button class="add-btn" style="background:var(--primary); color:white; padding:18px; margin-top:10px; font-size:1.1rem;" onclick="processOrder()">Place Order</button>
            <p style="text-align:center; color:#94a3b8; font-size:0.85rem; margin-top:15px; cursor:pointer;" onclick="closeCheckout()">Cancel Order</p>
        </div>

        <div id="finalBill" class="hidden" style="text-align:center;">
            <div class="success-check"><i class="fa fa-check-circle"></i></div>
            <h2 style="margin-top:0;">Order Confirmed!</h2>
            <p style="color:#64748b; margin-bottom:25px;">Order ID: #<span id="bId"></span></p>
            
            <div class="invoice-box">
                <div class="invoice-top">Official Invoice</div>
                <div id="bItems"></div>
                <div class="bill-item" style="background:#f8fafc; font-weight:700; font-size:1.1rem;">
                    <span>Grand Total</span>
                    <span>₹<span id="bTotal"></span></span>
                </div>
            </div>
            <button class="add-btn" style="margin-top:25px; background:var(--dark); color:white;" onclick="location.reload()">Back to Home</button>
        </div>
    </div>
</div>

let cart = []; let selectedPay = '';

function saveUser() {
    const n = document.getElementById("userNameInput").value.trim();
    if(n) { sessionStorage.setItem("user", n); checkUser(); }
}

function checkUser() {
    const u = sessionStorage.getItem("user");
    if(u) {
        document.getElementById("loginOverlay").classList.add("hidden");
        document.getElementById("mainApp").classList.remove("hidden");
        document.getElementById("welcomeMsg").innerHTML = `<i class="fa fa-user-circle"></i> Welcome, ${u}`;
        renderCategories(); renderProducts(allProducts); updateUI();
    }
}

function renderCategories() {
    document.getElementById("catBar").innerHTML = categories.map(c => `
        <div class="cat-item" onclick="filterCat('${c.id}', '${c.name}')">
            <img src="${c.img}"><span>${c.name}</span>
        </div>`).join('');
}

function filterCat(id, name) { 
    document.getElementById("catTitle").innerText = name;
    renderProducts(id==='all' ? allProducts : allProducts.filter(p => p.cat === id)); 
}

function renderProducts(arr) {
    document.getElementById("products").innerHTML = arr.map(p => `
        <div class="product">
            <img src="${p.img}">
            <div class="p-info">
                <h4 class="p-name">${p.name}</h4>
                <b class="p-price">₹${p.price}</b>
                <button class="add-btn" onclick="addToCart(${p.id})"><i class="fa fa-plus"></i> Add to Bag</button>
            </div>
        </div>`).join('');
}

function addToCart(id) {
    const p = allProducts.find(x=>x.id===id);
    const ex = cart.find(x=>x.id===id);
    if(ex) ex.qty++; else cart.push({...p, qty:1});
    updateUI();
}

function updateUI() {
    const count = cart.reduce((acc, item) => acc + item.qty, 0);
    document.getElementById("cartCount").innerText = count;
    let t = 0;
    document.getElementById("cartItems").innerHTML = cart.map((c) => {
        t += (c.price * c.qty);
        return `<div style="display:flex; gap:12px; margin-bottom:15px; background:#f8fafc; padding:10px; border-radius:12px;">
            <img src="${c.img}" style="width:50px; height:50px; border-radius:8px; object-fit:cover;">
            <div style="flex:1">
                <div style="font-size:0.8rem; font-weight:600;">${c.name}</div>
                <div style="font-size:0.75rem; color:#64748b;">₹${c.price} x ${c.qty}</div>
            </div>
            <b style="font-size:0.85rem;">₹${c.price*c.qty}</b>
        </div>`;
    }).join('');
    document.getElementById("totalPrice").innerText = t;
}

function toggleSidebar(id) { document.getElementById(id).classList.toggle("open"); }
function openCheckout() { if(cart.length>0) document.getElementById("checkoutModal").classList.remove("hidden"); }
function closeCheckout() { document.getElementById("checkoutModal").classList.add("hidden"); }

function setPay(m) {
    selectedPay = m;
    document.querySelectorAll('.pay-option').forEach(e => e.classList.remove('active'));
    document.getElementById('opt-'+m).classList.add('active');
    document.getElementById("upiBox").className = m==='upi' ? '' : 'hidden';
}

function processOrder() {
    const ph = document.getElementById("cPhone").value;
    if(ph.length < 10) return alert("Please enter valid 10-digit number!");
    if(!selectedPay) return alert("Select payment method!");
    
    document.getElementById("checkoutForm").classList.add("hidden");
    document.getElementById("finalBill").classList.remove("hidden");
    
    document.getElementById("bId").innerText = Math.floor(Math.random()*900000);
    
    let html = ''; let tot = 0;
    cart.forEach(c => {
        tot += (c.price * c.qty);
        html += `<div class="bill-item"><span>${c.name} (x${c.qty})</span><b>₹${c.price*c.qty}</b></div>`;
    });
    document.getElementById("bItems").innerHTML = html;
    document.getElementById("bTotal").innerText = tot;
    
    cart = []; updateUI();
}

function logout() { sessionStorage.clear(); location.reload(); }
window.onload = checkUser;
