<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoply</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header glass">
  <div class="left"><button id="menuBtn" class="icon-btn">&#9776;</button></div>
  <div class="center"><h1>shoply</h1></div>
  <div class="right">
    <button id="wishlistBtn" class="icon-btn">&#10084;</button>
    <button id="cartBtn" class="icon-btn">&#128722;<span id="cartCount">0</span></button>
  </div>
</header>

<section class="search-bar glass">
  <input type="text" id="searchInput" placeholder="Search products...">
</section>

<section class="banner glass gradient-bg">
  <div>
    <h2>35% OFF on first purchase!</h2>
    <button class="btn-gradient btn-lg">Download Now</button>
  </div>
</section>

<section class="location-bar glass">
  <p>Add delivery location to check extra discount</p>
</section>

<section class="categories">
  <div class="category-scroll" id="categoryScroll">
    <!-- JS populated categories -->
  </div>
</section>

<section class="products">
  <h3>Products For You</h3>
  <div class="filter-bar glass">
    <select id="sortSelect" class="select-filter"></select>
    <select id="categoryFilter" class="select-filter"></select>
    <select id="genderFilter" class="select-filter"></select>
    <button id="filterBtn" class="btn-gradient">Apply Filters</button>
  </div>
  <div id="productGrid" class="product-grid"></div>
</section>

<nav class="bottom-nav glass">
  <button class="nav-btn">Home</button>
  <button class="nav-btn">Categories</button>
  <button class="nav-btn">Mall</button>
  <button class="nav-btn">Help</button>
  <button class="nav-btn">Account</button>
</nav>

<script src="products.js"></script>
<script src="main.js"></script>
<script src="cart.js"></script>
</body>
</html>
